name: Activity Graph

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Ashutosh00710/github-readme-activity-graph@v1.1.1
        with:
          username: RafaelLfckkj
          theme: dracula
          hide_border: true
          output_dir: dist
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: activity-graph-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
